<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iComfort · Sensori</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,200..1000;1,200..1000&family=Oswald:wght@200..700&display=swap" rel="stylesheet">

<style>
:root {
  --bg: #ffffff;
  --surface: #e7fffd;
  --border: #cacacc;

  --accent: #308b82;
  --accent-glow: rgba(62,179,168,0.4);

  --warn: #ffaa00;

  --muted: #3eb3a8;

  --mono: 'Oswald', monospace;
  --sans: 'Nunito', sans-serif;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 30px;
  min-height: 100vh;
  overflow-x: hidden;
}

/* SCANLINE */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background: repeating-linear-gradient(
    0deg,
    transparent,
    transparent 2px,
    rgba(0,212,170,0.015) 2px,
    rgba(0,212,170,0.015) 4px
  );
  pointer-events: none;
  z-index: 9999;
}

/* HEADER */
header {
  display: flex;
  justify-content: space-between;
  padding: 12px 20px;
  border-bottom: 1px solid var(--border);
  background: #edfffe;
}

.logo {
  font-family: var(--mono);
  font-size: 28px;
  color: var(--accent);
  letter-spacing: 0.15em;
  text-transform: uppercase;
}

.status-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 10px var(--accent-glow);
  animation: pulse 2s ease-in-out infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; box-shadow: 0 0 10px var(--accent-glow); }
  50% { opacity: 0.5; box-shadow: 0 0 4px var(--accent-glow); }
}

.header-right {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
}

#last-update {
  color: var(--muted);
  font-family: var(--mono);
  font-size: 25px;
}

/* BOTTONE RICARICA PAGINA */
.ricarica-pagina {
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  background: var(--muted);
  color: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 8px 12px;
  cursor: pointer;
  transition: 0.2s ease;
  display: flex;
  align-items: center;
  gap: 6px;
}

.ricarica-pagina:hover {
  border-color: var(--accent);
  color: var(--bg);
  box-shadow: 2px 2px 1px var(--accent);
}

.ricarica-pagina:active {
  transform: scale(0.97);
}

/* MAIN */
main {
  padding: 16px 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.section-label {
  font-family: var(--mono);
  font-size: 16px;
  letter-spacing: 0.2em;
  color: var(--muted);
  text-transform: uppercase;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* SENSOR GRID */

.anomaly { color: #ad0000; }
.correct { color: #3eb3a8; }

#sensor-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 10px;
}

.sensor-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 12px;
  transition: 0.2s;
}

.sensor-card:hover {
  border-color: var(--accent);
}

.anomaly-card{
  background: #ff9090;
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 12px;
  transition: 0.2s;
}

.anomaly-card:hover{
  border-color:#af0000
}

.sensor-name {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 6px;
}

.anomaly-name{
  font-family: var(--mono);
  font-size: 12px;
  color: #880000;
  margin-bottom: 6px;
}

.sensor-value {
  font-family: var(--mono);
  font-size: 20px;
  /*color: #222;*/
}

.bad-values{
  font-family: var(--mono);
  font-size: 14px;
  color: #ad0000;
  margin-top: 10px;
}

/* GRAPH */
.graph-container {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 4px;
  min-height: 260px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  padding: 20px;
}

.graph-container:hover{
  border-color: var(--accent);
}

.graph-container img {
  width: 100%;
  max-width: 1000px;   /* <-- limita la dimensione */
  height: auto;
  display: block;
  image-rendering: auto;
  filter: saturate(10) contrast(1);
  image-rendering: -webkit-optimize-contrast;
}

.graph-loading {
  font-family: var(--mono);
  font-size: 20px;
  color: var(--muted);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}

.spinner {
  width: 100px; height: 100px;
  border: 10px solid var(--border);
  border-top-color: var(--muted);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

.error-msg {
  font-family: var(--mono);
  color: var(--warn);
}
</style>
</head>

<body>

<header>
  <div class="logo">iComfort · Live Monitor</div>
  <div class="header-right">
    <span id="last-update"></span>
    <div class="status-dot"></div>
    <button type="button" class="ricarica-pagina" id="ricarica-pagina">Ricarica pagina</button>
  </div>
</header>

<main>

  <div>
    <div class="section-label" id="orario">Ultime rilevazioni</div>
    <div id="sensor-grid"></div>
    <div class="bad-values" id="bad-values"></div>
  </div>

  <div>
    <div class="section-label">Temperatura · 24h (Grafico generato dalla richiesta HTTPS)</div>
    <div class="graph-container" id="graph-container">
      <div class="graph-loading" id="graph-loading">
        <div class="spinner"></div>
          Caricamento grafico...
        </div>
    </div>
  </div>

</main>

<script>
const API_KEY  = '1CFB6C41-D487-44C8-B042-FB5B81563748';
const GUID     = 'FF4EDEB4-D5B6-4B78-A8A1-B8F95FA079D7';
const BASE_URL = 'https://api.icomfort.it';

// Bottone per ricaricare la pagina
document.getElementById("ricarica-pagina").addEventListener("click", function () {location.reload();});

/* FORMAT */
function fmtVal(v) {
  if (v === null || v === undefined) return '—';
  const n = parseFloat(v);
  if (isNaN(n)) return String(v);
  return n % 1 === 0 ? n.toFixed(0) : n.toFixed(1);
}

/* FETCH SENSORS */
async function fetchSensors() {
  const res = await fetch(`${BASE_URL}/api/Measure/GetLastMeasuresByEntity?guid=${GUID}`, {
    headers: { 'Api-Key': API_KEY }
  });

  return res.json();
}

/* RENDER SENSORS */
function renderSensors(data) {
  const grid = document.getElementById('sensor-grid');
  const list = data?.MeasuresList;
  var renderSensori = ""

  var isAnomalo = [false, false, false, false, false, false, false, false, false, false, false, false]
  const valoreAnomalo = document.getElementById('bad-values');
  var stringValoreAnomalo = "";

  var orario = document.getElementById('orario')
  orario.innerHTML = "Ultime rilevazioni (" + (list[0].LastMeasure).slice(11) + ")"

  if (!Array.isArray(list)) {

    grid.innerHTML = '<div class="error-msg">Errore dati</div>';
    console.log('API response:', data);
    return;
  } else if (list.length === 0) {

    grid.innerHTML = '<div class="error-msg">Nessuna misura disponibile</div>';
    return;
  } else {

    // If che controllano se i valori sono troppo alti/bassi e danno un'avviso in caso lo siano
    if(list[0].Value <= 3){ // NuvapIndex
      
      stringValoreAnomalo += "<br>(NuvapIndex) Valore dell’indice Nuvap troppo ridotto, l’aria è inquinata e potrebbe causare problemi come mal di testa, stanchezza, irritazione delle vie respiratorie e riduzione del comfort ambientale."
      isAnomalo[0] = true
    }

    if(list[1].Value < 980){ // Pressione
      
      stringValoreAnomalo += "<br>(Pressure) Valori di pressione troppo ridotti che possono essere causare disturbi come mal di testa, stanchezza, dolori articolari e maggiore sensibilità ai cambiamenti meteorologici."
      isAnomalo[1] = true
    } else if (list[1].Value > 1030){

      stringValoreAnomalo += "<br>(Pressure) Valori di pressione troppo elevati che possono essere causare disturbi come mal di testa, stanchezza e sensazione di aria stagnante o secca."
      isAnomalo[1] = true
    }

    if(list[2].Value > 2000){ // CO2

      stringValoreAnomalo += "<br>(CO2) Valori di CO2 troppo elevati, l’aria è poco ventilata e potrebbe causare problemi come mal di testa, sonnolenza, vertigini, riduzione della concentrazione e confusione."
      isAnomalo[2] = true
    }

    if(list[3].Value > 50){ // PM10

      stringValoreAnomalo += "<br>(PM10) Valori di PM10 troppo elevati, l’aria è inquinata e potrebbe causare problemi come irritazione delle vie respiratorie, tosse e disturbi a carico di polmoni e cuore."
      isAnomalo[3] = true
    }

    if(list[4].Value > 15){ // PM25

      stringValoreAnomalo += "<br>(PM25) Valori di PM25 troppo elevati, l’aria è inquinata e potrebbe causare problemi molto seri come infiammazione polmonare, peggioramento dell’asma e disturbi cardiovascolari."
      isAnomalo[4] = true
    }

    if(list[5].Value > 20){ // PM1

      stringValoreAnomalo += "<br>(PM1) Valori di PM1 troppo elevati, l’aria è inquinata e potrebbe causare problemi come infiammazione profonda delle vie respiratorie, irritazione polmonare e possibili effetti sul sistema cardiovascolare."
      isAnomalo[5] = true
    }

    if(list[6].Value > 1000){ //VOC

      stringValoreAnomalo += "<br>(VOC) Valori di VOC troppo elevati, l’aria è inquinata e potrebbe causare problemi come mal di testa, stanchezza, irritazione di occhi e vie respiratorie e nausea."
      isAnomalo[6] = true
    }

    if(list[7].Value > 2000){ //CO2 Equivalent

      stringValoreAnomalo += "<br>(CO2 Equivalent) Valori di CO2 equivalente troppo elevati, l’aria è poco ventilata e potrebbe causare problemi come mal di testa, sonnolenza, vertigini, riduzione della concentrazione e confusione."
      isAnomalo[7] = true
    }

    if(list[8].Value < 30){ //Umidità

      stringValoreAnomalo += "<br>(Humidity) Valori di umidità troppo ridotti e possono causare problemi come pelle secca, irritazione agli occhi e alle vie respiratorie e fastidio generale."
      isAnomalo[8] = true
    } else if(list[8].Value > 60){

      stringValoreAnomalo += "<br>(Humidity) Valori di umidità troppo elevati e possono causare problemi come sensazione di aria pesante, disagio, affaticamento e aumento del rischio di muffe e cattiva qualità dell’aria interna."
      isAnomalo[8] = true
    }

    if(list[9].Value < 0){ //temp2

      stringValoreAnomalo += "<br>(temp2) Valori di temperatura troppo ridotti e possono causare sensazione di freddo intenso, rischio di ipotermia in caso di esposizione prolungata e disagio generale."
      isAnomalo[9] = true
    } else if(list[9].Value > 35){

      stringValoreAnomalo += "<br>(temp2) Valori di temperatura troppo elevati e possono causare rischio di disidratazione, colpi di calore e forte stress termico in caso di esposizione prolungata."
      isAnomalo[9] = true
    }

    if(list[10].Value < 18){ //Temperature

      stringValoreAnomalo += "<br>(Temperature) Valori di temperatura troppo ridotti e possono causare sensazione di freddo, disagio, rigidità muscolare e riduzione del comfort ambientale."
      isAnomalo[10] = true
    } else if(list[10].Value > 26){

      stringValoreAnomalo += "<br>(Temperature) Valori di temperatura troppo elevati e possono causare sensazione di caldo, affaticamento, disidratazione e riduzione della concentrazione."
      isAnomalo[10] = true
    }

    if(list[11].Value == 1){ //Led_Event

      stringValoreAnomalo += "<br>(Led_Event) È attivo un evento di segnalazione del dispositivo, potrebbe indicare uno stato di avviso, errore o allarme da verificare nel sistema."
      isAnomalo[11] = true
    }

    // Scrive l'avviso (il valore di stringValoreAnomalo) all'interno dell'HTML
    valoreAnomalo.innerHTML = stringValoreAnomalo

    // Loop che scrive il render di ogni singolo sensore all'interno di renderSensori e cambia il colore del testo in base al valore (Se è corretto o anomalo)
    for(i = 0; i < list.length; i++){

      if(i == 6){
        
        renderSensori += '<p><p><p><p><p>'
      }

      if(!isAnomalo[i]){

        renderSensori += `<div class="correct sensor-card">
        <div class="sensor-name">${list[i].EventName ?? '—'}</div>
        <div class="sensor-value">${list[i].Value+" "+list[i].Unity}</div></div>`
      } else {

        renderSensori += `<div class="anomaly anomaly-card">
        <div class="anomaly-name">${list[i].EventName ?? '—'}</div>
        <div class="sensor-value">${list[i].Value+" "+list[i].Unity}</div></div>`
      }
    }
    // Scrive il codice per renderizzare i sensori all'interno dell'HTML
    grid.innerHTML = renderSensori;
  }
}

/* GRAPH */
async function fetchGraph() {
  const res = await fetch(`${BASE_URL}/GraphEngine/api/Graph/GetSpaceDataGraph`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Api-Key': API_KEY
    },
    body: JSON.stringify({
      Tags: ['Temperature','Actual'],
      ElementGuid: GUID,
      Params: { StartDate: '24 Hours Ago', EndDate: 'Now' },
      GetBase64Image: false
    })
  });

  return res.json();
}

async function loadGraph() {
  const container = document.getElementById('graph-container');

  try {
    const data = await fetchGraph();
    const img = data?.Contents?.[0]?.Payload;

    if (!img) throw new Error('No image');

    container.innerHTML = `<img src="${img}?t=${Date.now()}">`;

  } catch (e) {
    container.innerHTML = `<div class="error-msg">Errore grafico</div>`;
    console.error(e);
  }
}

/* INIT */
window.addEventListener('DOMContentLoaded', async () => {
  try {
    const sensors = await fetchSensors();
    renderSensors(sensors);

    document.getElementById('last-update').textContent =
    'Aggiornato ' + new Date().toLocaleTimeString('it-IT', {
    hour:'2-digit',
    minute:'2-digit'
    });

  } catch (e) {
    console.error(e);
  }

  loadGraph();
});
</script>

</body>
</html>
